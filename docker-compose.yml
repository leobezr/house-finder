services:
  n8n:
    image: ghcr.io/n8n-io/n8n:latest
    container_name: automated-house-search-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: Europe/Madrid
      TZ: Europe/Madrid
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
